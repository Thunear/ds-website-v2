[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page app: every route is served by index.html so client-side
# routing (react-router) handles deep links and refreshes instead of 404ing.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
